name: Axe Accessibility Audit

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  axe-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start preview server
        run: |
          npx vite preview --port 5173 &
          sleep 2
      - name: Run axe audit
        run: node scripts/ci-axe.js