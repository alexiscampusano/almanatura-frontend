name: Axe accessibility audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  axe-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install test tools
        run: |
          npm i -D playwright axe-core
          npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npx vite preview --host 127.0.0.1 --port 5173 & npx wait-on http-get://127.0.0.1:5173

      - name: Run axe audit
        run: node scripts/ci-axe.js
